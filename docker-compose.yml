services:
  mongodb:
    image: mongo:7
    container_name: medpulse-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - medpulse-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: medpulse-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://root:rootpassword@mongodb:27017/medpulse?authSource=admin
      CORS_ORIGIN: http://localhost:3000
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - medpulse-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: medpulse-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - medpulse-network

  nginx:
    image: nginx:alpine
    container_name: medpulse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - medpulse-network

volumes:
  mongodb_data:

networks:
  medpulse-network:
    driver: bridge
