name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    # Pinned to 22.04: mongodb-memory-server's MongoDB binary does not reliably
    # run on ubuntu-latest (24.04) due to OpenSSL/library differences.
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Cache MongoDB binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Test backend
        run: npm run test

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build